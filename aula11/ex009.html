<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidades</title>
</head>
<body>
    <h1>Sistema de Detecção de Nacionalidade</h1>
   País: <input type="text" name="txtnac" id="txtnac"> 
    <input type="button" value="Verificar" onclick="descobrir()">
    <div id="res">
        Resultado
    </div>

    <script>
        function descobrir(){
            var txtn = document.getElementById('txtnac')
            var res = document.getElementById('res')
            var nac = txtn.value
            res.innerHTML = `<p>Você reside no País <strong> ${nac}</strong></p>`
            if(nac == "Brasil"){
                res.innerHTML += `Você é Brasileiro`

            }else{
                res.innerHTML += `Você é estrangeiro`
            }
        }
    </script>
</body>
</html>
